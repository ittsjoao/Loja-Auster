services:
  db:
    image: postgres:16-alpine
    container_name: lojauster-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lojaAuster
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - lojauster-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lojauster-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/lojaAuster
      PORT: 3001
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      FEEDZ_API_KEY: ${FEEDZ_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      UPLOAD_DIR: /app/uploads
    volumes:
      - ${UPLOAD_DIR:-./uploads}:/app/uploads
    ports:
      - "3001:3001"
    networks:
      - lojauster-internal

volumes:
  postgres_data:

networks:
  lojauster-internal:
