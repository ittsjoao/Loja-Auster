services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_AUTHENTIK_ENABLED: ${VITE_AUTHENTIK_ENABLED:-false}
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: lojauster-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lojaAuster
      PORT: 3001
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://loja.seudominio.com.br/api}
      FEEDZ_API_KEY: ${FEEDZ_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      AUTHENTIK_ISSUER_URL: ${AUTHENTIK_ISSUER_URL}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET}
      AUTHENTIK_REDIRECT_URI: ${AUTHENTIK_REDIRECT_URI}
      # Authentik is served with the internal AD CA cert; trust it like the other
      # internal services (same as outline) instead of bundling the CA.
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      UPLOAD_DIR: /app/uploads
    volumes:
      - ${UPLOAD_DIR}:/app/uploads
    ports:
      - "3001:3001"
    dns:
      # AD DNS: resolves internal *.auster.local names (e.g. the Authentik issuer)
      - 10.10.30.242
    networks:
      - proxy

networks:
  proxy:
    external: true
